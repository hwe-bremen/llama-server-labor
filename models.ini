; models.ini — Router-Preset fuer llama.cpp (--models-preset)
; -----------------------------------------------------------
; Pro Modell die korrekten Sampling-Parameter, damit der Vergleich
; im Router fair wird. Schluessel = llama-server-Flags ohne "--".
;
; Start:  llama-server --port 8080 --models-preset /PFAD/models.ini
; Mode B: lokale Config, Rollback = Datei loeschen.
;
; Hinweis: Das INI-Format ist ueber llama.cpp-Versionen nicht voll
; standardisiert. Nach einem llama.cpp-Upgrade kurz testen, ob die
; Datei noch sauber laedt (curl /v1/models zeigt alle Eintraege).

version = 1

; --- Globale Defaults, gelten fuer alle Modelle (pro Modell ueberschreibbar) ---
[*]
jinja = 1
; MCP-Tool-Workflows fuellen den Kontext schnell (Tool-Defs + Ergebnisse).
; 8192 war fuer reinen Chat ok, fuer Agentic zu klein -> 32768.
ctx-size = 32768
n-gpu-layers = 99

; --- Mellum Q6: Coding-Spezialist. Niedrige Temperatur fuer stabile
;     Tool-Calls und reproduzierbare Code-Ausgaben. ---
[JetBrains/Mellum2-12B-A2.5B-Thinking-GGUF-Q6_K:Q6_K]
hf-repo = JetBrains/Mellum2-12B-A2.5B-Thinking-GGUF-Q6_K:Q6_K
temp = 0.2
top-p = 0.95

; --- Mellum Q4: gleiche Rolle, fuer Q4-vs-Q6-Vergleich. ---
[JetBrains/Mellum2-12B-A2.5B-Thinking-GGUF-Q4_K_M:Q4_K_M]
hf-repo = JetBrains/Mellum2-12B-A2.5B-Thinking-GGUF-Q4_K_M:Q4_K_M
temp = 0.2
top-p = 0.95

; --- Qwen3.6 27B: allgemeiner Chat/Reasoning. Qwen-empfohlene Werte
;     fuer Thinking-Mode. ---
[unsloth/Qwen3.6-27B-MTP-GGUF:Q4_K_XL]
hf-repo = unsloth/Qwen3.6-27B-MTP-GGUF:Q4_K_XL
temp = 0.6
top-p = 0.95
top-k = 20
min-p = 0.0

; --- Gemma 4 26B A4B: allgemeiner Chat, multimodal. Gemma-empfohlene
;     Werte. ---
[unsloth/gemma-4-26B-A4B-it-GGUF:Q4_K_XL]
hf-repo = unsloth/gemma-4-26B-A4B-it-GGUF:Q4_K_XL
temp = 1.0
top-p = 0.95
top-k = 64
